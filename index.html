<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<meta name="googlebot" content="noindex, nofollow">
<title>Partner Portal · Sterlinx Global</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0f1f3d">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0f1f3d;--accent:#c8a96e;--accent2:#e8c98a;
  --white:#fff;--off:#f7f6f3;--muted:#8a8f9e;--border:#e4e2dd;
  --paid-bg:#e8f5ee;--paid-txt:#1a6b3c;
  --pend-bg:#fff4e0;--pend-txt:#8a5a00;
  --none-bg:#faeaea;--none-txt:#9b2c2c;
  --text:#1a1f2e;--sub:#4a5168;
}
html,body{height:100%}
body{font-family:'DM Sans',sans-serif;background:var(--off);color:var(--text);display:flex;min-height:100vh}

/* ── Sidebar ── */
.sidebar{width:240px;min-height:100vh;background:var(--navy);display:flex;flex-direction:column;padding:2rem 1.5rem;position:fixed;top:0;left:0;bottom:0;z-index:10}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:2.5rem}
.logo-mark{width:32px;height:32px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:16px;color:var(--navy);flex-shrink:0}
.logo-text{font-size:13px;font-weight:500;color:var(--white);line-height:1.3}
.logo-sub{font-size:10px;color:rgba(255,255,255,.35);letter-spacing:.08em;text-transform:uppercase}
.nav-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:.75rem;padding-left:.5rem}
.nav-item{display:flex;align-items:center;gap:10px;padding:.6rem .75rem;border-radius:8px;font-size:13px;color:rgba(255,255,255,.6);margin-bottom:2px;text-decoration:none;transition:all .15s}
.nav-item.active,.nav-item:hover{background:rgba(255,255,255,.08);color:var(--white)}
.nav-item.active{color:var(--accent2)}
.nav-icon{font-size:13px;width:18px;text-align:center}
.sidebar-footer{margin-top:auto;border-top:1px solid rgba(255,255,255,.08);padding-top:1.25rem}
.partner-chip{display:flex;align-items:center;gap:10px;margin-bottom:.75rem}
.logout-btn{display:none;width:100%;padding:7px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:rgba(255,255,255,.5);font-size:12px;cursor:pointer;transition:all .15s}
.logout-btn:hover{background:rgba(255,255,255,.12);color:var(--white)}
.avatar{width:34px;height:34px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:var(--navy);flex-shrink:0}
.p-name{font-size:13px;color:var(--white);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-role{font-size:10px;color:rgba(255,255,255,.35)}

/* ── Main ── */
.main{margin-left:240px;flex:1;padding:2rem 2.5rem;min-height:100vh}
.topbar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:2rem}
.page-title{font-family:'DM Serif Display',serif;font-size:26px;font-weight:400;line-height:1.2}
.page-sub{font-size:13px;color:var(--muted);margin-top:4px}
.rate-pill{background:var(--navy);color:var(--accent2);font-size:12px;font-weight:500;padding:6px 14px;border-radius:99px;white-space:nowrap}

/* ── KPIs ── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:1.75rem}
.kpi-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:1.25rem 1.5rem;position:relative;overflow:hidden;animation:fadeUp .4s ease both}
.kpi-card:nth-child(2){animation-delay:.06s}
.kpi-card:nth-child(3){animation-delay:.12s}
.kpi-card:nth-child(4){animation-delay:.18s}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi-card.c-earned::before{background:var(--navy)}
.kpi-card.c-paid::before{background:#1a6b3c}
.kpi-card.c-pend::before{background:#8a5a00}
.kpi-card.c-count::before{background:var(--accent)}
.kpi-label{font-size:11px;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;margin-bottom:8px}
.kpi-value{font-family:'DM Serif Display',serif;font-size:28px;line-height:1}
.kpi-card.c-paid .kpi-value{color:var(--paid-txt)}
.kpi-card.c-pend .kpi-value{color:var(--pend-txt)}
.kpi-note{font-size:11px;color:var(--muted);margin-top:6px}

/* ── Content grid ── */
.content-grid{display:grid;grid-template-columns:minmax(0,1fr) 280px;gap:16px;align-items:start}
.right-col{display:flex;flex-direction:column;gap:14px}

/* ── Cards ── */
.card{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;animation:fadeUp .4s .2s ease both}
.card-head{padding:1rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:13px;font-weight:500}
.card-badge{font-size:11px;color:var(--muted);background:var(--off);padding:2px 10px;border-radius:99px}

/* ── Invoice table ── */
.tbl-wrap{overflow-x:auto}
.inv-tbl{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
.inv-tbl th{text-align:left;padding:10px 14px;font-size:11px;font-weight:500;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;background:var(--off);border-bottom:1px solid var(--border);white-space:nowrap}
.inv-tbl td{padding:11px 14px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
.inv-tbl tr:last-child td{border-bottom:none}
.inv-tbl td:first-child,.inv-tbl th:first-child{width:160px;max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.inv-tbl tbody tr:hover td{background:#fafaf8}
.mono{font-family:monospace;font-size:12px;color:var(--sub)}
.sortable{cursor:pointer;user-select:none;white-space:nowrap}
.sortable:hover{color:var(--text)}
.sort-arrow{margin-left:4px;opacity:0.4;font-size:10px}
.sortable.active .sort-arrow{opacity:1;color:var(--navy)}

/* ── Pills ── */
.pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:500;padding:3px 10px;border-radius:99px;white-space:nowrap}
.pill::before{content:'';width:5px;height:5px;border-radius:50%}
.pill-paid{background:var(--paid-bg);color:var(--paid-txt)}.pill-paid::before{background:var(--paid-txt)}
.pill-pending{background:var(--pend-bg);color:var(--pend-txt)}.pill-pending::before{background:var(--pend-txt)}
.pill-nocomm{background:var(--none-bg);color:var(--none-txt)}.pill-nocomm::before{background:var(--none-txt)}

/* ── Client bars ── */
.client-item{padding:.75rem 1.25rem;border-bottom:1px solid var(--border)}
.client-item:last-child{border-bottom:none}
.client-row{display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px;font-weight:500}
.bar-track{height:3px;background:var(--border);border-radius:2px}
.bar-fill{height:3px;background:var(--navy);border-radius:2px;transition:width .9s cubic-bezier(.4,0,.2,1)}

/* ── Summary ── */
.sum-row{display:flex;justify-content:space-between;padding:.7rem 1.25rem;border-bottom:1px solid var(--border);font-size:13px}
.sum-row:last-child{border-bottom:none}
.sum-lbl{color:var(--sub)}.sum-val{font-weight:500}

/* ── Rules ── */
.rules-wrap{padding:.75rem 1.25rem}
.rule{display:flex;gap:10px;padding:.5rem 0;border-bottom:1px solid var(--border);font-size:12px;color:var(--sub);line-height:1.5}
.rule:last-child{border-bottom:none}
.rule-n{width:18px;height:18px;border-radius:50%;background:var(--navy);color:var(--white);font-size:10px;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}

/* ── States ── */
.state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;gap:1rem}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--navy);border-radius:50%;animation:spin .8s linear infinite}
.state-title{font-family:'DM Serif Display',serif;font-size:22px}
.state-sub{font-size:14px;color:var(--muted);max-width:400px;line-height:1.6}
.state-sub code{background:var(--off);padding:2px 6px;border-radius:4px;font-size:12px;border:1px solid var(--border)}

/* ── Pagination ── */
.pagination{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1.25rem;border-top:1px solid var(--border)}
.pg-btns{display:flex;gap:8px}
.pg-btn{padding:5px 14px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:var(--white);color:var(--text);cursor:pointer;transition:all .15s}
.pg-btn:hover:not(:disabled){background:var(--navy);color:var(--white);border-color:var(--navy)}
.pg-btn:disabled{opacity:.4;cursor:default}
.pg-info{font-size:12px;color:var(--muted)}

/* ── Footer ── */
.footer{margin-top:2rem;padding-top:1rem;border-top:1px solid var(--border);font-size:11px;color:var(--muted);display:flex;justify-content:space-between}

/* ── Animations ── */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ── Responsive ── */
@media(max-width:900px){.sidebar{display:none}.main{margin-left:0;padding:1.25rem}.kpi-grid{grid-template-columns:repeat(2,1fr)}.content-grid{grid-template-columns:1fr}}
@media(max-width:500px){.kpi-grid{grid-template-columns:1fr 1fr}.rate-pill{display:none}}
.pill-due{background:#e8f5ee;color:#1a6b3c}.pill-due::before{background:#1a6b3c}
.pill-notdue{background:#fff4e0;color:#8a5a00}.pill-notdue::before{background:#8a5a00}
.filter-bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.filter-btn{padding:5px 14px;border:1px solid var(--border);border-radius:99px;background:var(--white);font-size:12px;cursor:pointer;color:var(--sub);transition:all .15s}
.filter-btn.active{background:var(--navy);color:var(--white);border-color:var(--navy)}
@media(max-width:768px){
  .col-hide-mobile{display:none}
  .tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .inv-tbl{font-size:12px;table-layout:fixed;width:100%}
  .inv-tbl td,.inv-tbl th{padding:8px 6px}
  .inv-tbl th:nth-child(1),.inv-tbl td:nth-child(1){width:25%}
  .inv-tbl th:nth-child(2),.inv-tbl td:nth-child(2){width:20%}
  .inv-tbl th:nth-child(6),.inv-tbl td:nth-child(6){width:25%;min-width:70px;padding-right:12px;text-align:right}
  .inv-tbl th:last-child,.inv-tbl td:last-child{width:30%;min-width:70px}
  .filter-bar{gap:5px}
  .filter-btn{padding:4px 10px;font-size:11px}
  .content-grid{grid-template-columns:1fr}
  .kpi-value{font-size:22px}
}
</style>
</head>
<body>
<div id="staging-banner" style="background:#f59e0b;color:#000;text-align:center;padding:8px 16px;font-size:13px;font-weight:600;letter-spacing:0.05em;position:sticky;top:0;z-index:9999;">
  ⚠ STAGING — Not live data &nbsp;·&nbsp; <a href="https://partners.sterlinxglobal.com" style="color:#000;text-decoration:underline;">Go to Production →</a>
</div>

<aside class="sidebar">
  <div class="logo">
    <div class="logo-mark">S</div>
    <div>
      <div class="logo-text">Sterlinx Global</div>
      <div class="logo-sub">Partner Portal</div>
    </div>
  </div>
  <div class="nav-label">Menu</div>
  <a class="nav-item active" href="#"><span class="nav-icon">◈</span> Commission</a>
  
  
  <div class="sidebar-footer">
    <div class="partner-chip">
      <div class="avatar" id="sb-av">--</div>
      <div>
        <div class="p-name" id="sb-name">Loading...</div>
        <div class="p-role">Affiliate Partner</div>
      </div>
    </div>
    <button class="logout-btn" id="logout-btn">Sign out</button>
  </div>
</aside>

<main class="main" id="app">
  <div class="state">
    <div class="spinner"></div>
    <div class="state-title">Loading your dashboard</div>
    <div class="state-sub">Fetching commission data...</div>
  </div>
</main>

<script>
// ════════════════════════════════════════════════════════════════════
//  ★  ONLY THING YOUR STAFF NEED TO CONFIGURE — EVER
//
//  Step 1: Create a Google Sheet with this EXACT layout:
//
//  Tab name: Partners
//  ┌─────────────┬────────────┬──────────────────────────────┬────────────────┬──────────┐
//  │ PartnerName │ PartnerURL │ SheetURL                     │ CommissionRate │ SheetTab │
//  ├─────────────┼────────────┼──────────────────────────────┼────────────────┼──────────┤
//  │ Anil Demir  │ anil-demir │ https://docs.google.com/...  │ 20             │ Commission_Log│
//  │ Jane Smith  │ jane-smith │ https://docs.google.com/...  │ 20             │ Commission_Log│
//  └─────────────┴────────────┴──────────────────────────────┴────────────────┴──────────┘
//
//  Step 2: Publish it → File → Share → Publish to web
//          → Choose "Partners" tab → CSV format → Publish
//
//  Step 3: Copy the Sheet ID from the URL and paste below.
//          Sheet URL looks like:
//          https://docs.google.com/spreadsheets/d/SHEET_ID_IS_HERE/edit
//
// ════════════════════════════════════════════════════════════════════
const CONFIG_SHEET_ID = '13fHDhjOfeX1UKIUpJ1EKYQgEyqiP_JUoyUzrqIpdgXk';
const CONFIG_CSV_DIRECT = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQBjSjoJK_VTgBKzGc5_NBNxmPDEPhJB99fxULVMF1B1Xn0SeGbG9Yu_leUq49K9VasFMKYwVMDl43k/pub?gid=614516397&single=true&output=csv';

// ── Column headers in the config sheet (don't change unless you rename them) ──
const C = {
  name:    'PartnerName',
  slug:    'PartnerURL',
  url:     'SheetURL',
  rate:    'CommissionRate',
  tab:     'SheetTab',
  password: 'Password',
};

// ── Column headers in each partner's commission sheet ──
// If you rename a column in a partner's sheet, update it here
const D = {
  entity:       'EntityName',
  invoiceId:    'InvoiceID',
  invoiceDate:  'InvoiceDate',
  payDate:      'InvoicePaymentDate',
  amtExVAT:     'AmountExVAT',
  commAmt:      'CommissionAmount',
  commDueDate:  'PaymentDueDate',
  commPaidDate: 'CommissionPaidDate',
  partnerRef:   'PartnersInvoiceID',
};

// ════════════════════════════════════════════════════════════════════
//  Core helpers
// ════════════════════════════════════════════════════════════════════

function getSlug(){
  return window.location.hash.replace('#', '').split('/').filter(Boolean)[0] || null;
}

// Accepts any Google Sheets URL — standard /d/ID or published /d/e/2PACX- format
function extractId(url){
  if(!url) return null;
  // Published CSV: /spreadsheets/d/e/2PACX-...
  const pub = url.match(/spreadsheets\/d\/e\/(2PACX-[a-zA-Z0-9_-]+)/);
  if(pub) return pub[1];
  // Standard sheet ID: /spreadsheets/d/SHEET_ID
  const std = url.match(/spreadsheets\/d\/([a-zA-Z0-9_-]+)/);
  return std ? std[1] : null;
}

function parseCsv(text){
  return new Promise((res, rej) =>
    Papa.parse(text, {
      header: true,
      skipEmptyLines: true,
      complete: r => res(r.data),
      error:    e => rej(e),
    })
  );
}

async function fetchSheet(sheetUrl,skip){
  // Direct fetch — Google Sheets published CSV URLs are CORS-open
  const r = await fetch(sheetUrl);
  if(!r.ok) throw new Error(`Could not load sheet (${r.status})`);
  const t = await r.text();
  return parseCsv(skip?t.split(String.fromCharCode(10)).slice(skip).join(String.fromCharCode(10)):t);
}

function gbp(n){n=String(n).replace(/[£,£]/g,"");
  return '£' + (parseFloat(n)||0).toLocaleString('en-GB',
    {minimumFractionDigits:2, maximumFractionDigits:2});
}

function pnum(v){ return parseFloat(String(v||0).replace(/[£,]/g,''))||0; }

function dt(s){
  if(!s) return '—';
  // Handle DD/MM/YYYY format from Google Sheets
  const parts = s.split('/');
  if(parts.length === 3){
    const d = new Date(parts[2], parts[1]-1, parts[0]);
    return isNaN(d) ? s : d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
  }
  const d = new Date(s);
  return isNaN(d) ? s : d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
}

function getStatus(row){
  const paid = (row[D.commPaidDate]||'').trim();
  if(paid) return 'Paid';
  const ds = (row[D.commDueDate]||'').trim();
  const parts = ds.split('/');
  const due = parts.length===3 ? new Date(parts[2],parts[1]-1,parts[0]) : new Date(ds);
  const today = new Date();
  today.setHours(0,0,0,0);
  return (!isNaN(due) && today >= due) ? 'Due for Payment' : 'Not Due';
}
function statusPill(status){
  if(status==='Paid') return '<span class="pill pill-paid">Paid</span>';
  if(status==='Due for Payment') return '<span class="pill pill-due">Due</span>';
  return '<span class="pill pill-notdue">Not Due</span>';
}

function av(name){
  return (name||'??').trim().split(' ')
    .map(w => w[0]).join('').toUpperCase().slice(0,2);
}

// ════════════════════════════════════════════════════════════════════
//  Render
// ════════════════════════════════════════════════════════════════════
function showError(title, msg){
  document.getElementById('app').innerHTML = `
    <div class="state">
      <div style="font-size:2rem">⚠</div>
      <div class="state-title">${title}</div>
      <div class="state-sub">${msg}</div>
    </div>`;
}

function showSignout(show){
  const btn = document.getElementById('logout-btn');
  if(btn) btn.style.display = show ? 'block' : 'none';
}

function showLanding(){
  showSignout(false);
  document.getElementById('sb-av').textContent  = 'S';
  document.getElementById('sb-name').textContent = 'Partner Portal';
  document.getElementById('app').innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;text-align:center;padding:2rem">
      <div style="width:72px;height:72px;background:var(--navy);border-radius:16px;display:flex;align-items:center;justify-content:center;margin-bottom:1.5rem;box-shadow:0 4px 20px rgba(10,25,47,.15)">
        <span style="font-family:'DM Serif Display',serif;font-size:36px;color:#c9a84c;line-height:1">S</span>
      </div>
      <div style="font-family:'DM Serif Display',serif;font-size:28px;color:var(--navy);margin-bottom:.75rem">Sterlinx Global Partner Portal</div>
      <div style="font-size:14px;color:var(--muted);max-width:420px;line-height:1.7;margin-bottom:2rem">
        This is a secure portal for Sterlinx Global affiliate partners. If you have been onboarded as a partner, please use the private URL provided to you.
      </div>
      <div style="background:var(--white);border:1px solid var(--border);border-radius:12px;padding:1.25rem 2rem;font-size:13px;color:var(--sub);max-width:380px">
        <div style="font-weight:500;color:var(--text);margin-bottom:4px">Need your access link?</div>
        <div>Contact us at <a href="mailto:info@sterlinxglobal.com" style="color:var(--navy);text-decoration:none;font-weight:500">info@sterlinxglobal.com</a></div>
      </div>
      <div style="margin-top:3rem;font-size:11px;color:var(--muted)">© Sterlinx Global Ltd</div>
    </div>`;
}

function makeRows(data){
  return data.map(r => {
    const status = getStatus(r);
    return `<tr data-status="${status}">
      <td>${(r[D.entity]||'—').trim()}</td>
      <td class="mono">${(r[D.invoiceId]||'—').trim()}</td>
      <td class="col-hide-mobile">${dt(r[D.invoiceDate])}</td>
      <td class="col-hide-mobile">${dt(r[D.payDate])}</td>
      <td class="col-hide-mobile" style="text-align:right">${pnum(r[D.amtExVAT])>0 ? gbp(r[D.amtExVAT]) : '—'}</td>
      <td style="text-align:right">${pnum(r[D.commAmt])>0 ? gbp(r[D.commAmt]) : '—'}</td>
      <td class="col-hide-mobile">${dt(r[D.commDueDate])}</td>
      <td class="col-hide-mobile mono">${status === 'Paid' ? (r[D.partnerRef]||'—').trim() : '—'}</td>
      <td>${statusPill(status)}</td>
    </tr>`;
  }).join('');
}

function renderDashboard(partner, rows){
  const rate = parseFloat(partner[C.rate]) || 20;
  rows = rows.filter(r => r[D.entity] && r[D.entity].trim() !== 'TOTALS' && r[D.invoiceId] && r[D.invoiceId].trim() !== '');

  const earned = rows.reduce((s,r) => s+pnum(r[D.commAmt]), 0);
  const paid   = rows.filter(r => getStatus(r) === 'Paid').reduce((s,r) => s+pnum(r[D.commAmt]), 0);

function setupTable(rows){
  const PAGE_SIZE = 10;
  const tbody     = document.getElementById('inv-tbody');
  const pg        = document.getElementById('pagination');
  const filterBar = document.getElementById('filter-bar');
  if(!tbody || !pg || !filterBar) return;

  let activeFilter = 'All';
  let page = 0;
  let sortCol = null;
  let sortDir = 'asc';

  function parseDate(s){
    if(!s) return null;
    const parts = String(s).split('/');
    if(parts.length === 3){
      const d = new Date(parts[2], parts[1]-1, parts[0]);
      return isNaN(d) ? null : d;
    }
    const d = new Date(s);
    return isNaN(d) ? null : d;
  }

  function getSortValue(row, col){
    if(col === 'entity')      return (row[D.entity]||'').trim().toLowerCase();
    if(col === 'invoiceId')   return (row[D.invoiceId]||'').trim().toLowerCase();
    if(col === 'invoiceDate') return parseDate(row[D.invoiceDate]);
    if(col === 'payDate')     return parseDate(row[D.payDate]);
    if(col === 'amtExVAT')    return pnum(row[D.amtExVAT]);
    if(col === 'commAmt')     return pnum(row[D.commAmt]);
    if(col === 'commDueDate') return parseDate(row[D.commDueDate]);
    if(col === 'status')      return getStatus(row);
    return '';
  }

  function compare(a, b){
    if(a === null && b === null) return 0;
    if(a === null) return 1;
    if(b === null) return -1;
    if(a instanceof Date && b instanceof Date) return a - b;
    if(typeof a === 'number' && typeof b === 'number') return a - b;
    return String(a).localeCompare(String(b));
  }

  function getFiltered(){
    if(activeFilter === 'All') return rows.slice();
    return rows.filter(r => getStatus(r) === activeFilter);
  }

  function getSorted(filteredRows){
    if(!sortCol) return filteredRows;
    return filteredRows.slice().sort((a, b) => {
      const va = getSortValue(a, sortCol);
      const vb = getSortValue(b, sortCol);
      const cmp = compare(va, vb);
      return sortDir === 'asc' ? cmp : -cmp;
    });
  }

  function updateSortHeaders(){
    document.querySelectorAll('.inv-tbl th[data-sort]').forEach(th => {
      const arrow = th.querySelector('.sort-arrow');
      if(!arrow) return;
      if(th.dataset.sort === sortCol){
        th.classList.add('active');
        arrow.textContent = sortDir === 'asc' ? ' ↑' : ' ↓';
      } else {
        th.classList.remove('active');
        arrow.textContent = ' ↕';
      }
    });
  }

  function render(){
    const filtered = getFiltered();
    const sorted   = getSorted(filtered);
    const total    = sorted.length;
    const start    = page * PAGE_SIZE;
    const end      = Math.min(start + PAGE_SIZE, total);
    const visible  = sorted.slice(start, end);

    tbody.innerHTML = makeRows(visible) ||
      `<tr><td colspan="9" style="text-align:center;padding:2rem;color:var(--muted)">No records found</td></tr>`;

    if(total <= PAGE_SIZE){
      pg.style.display = 'none';
    } else {
      pg.style.display = '';
      const totalPages = Math.ceil(total / PAGE_SIZE);
      pg.innerHTML = `
        <span class="pg-info">Showing ${start+1}–${end} of ${total}</span>
        <div class="pg-btns">
          <button class="pg-btn" id="pg-prev" ${page===0?'disabled':''}>← Previous</button>
          <button class="pg-btn" id="pg-next" ${page===totalPages-1?'disabled':''}>Next →</button>
        </div>`;
      document.getElementById('pg-prev').addEventListener('click', ()=>{ page--; render(); });
      document.getElementById('pg-next').addEventListener('click', ()=>{ page++; render(); });
    }
  }

  document.querySelectorAll('.inv-tbl th[data-sort]').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.sort;
      if(sortCol !== col){
        sortCol = col;
        sortDir = 'asc';
      } else if(sortDir === 'asc'){
        sortDir = 'desc';
      } else {
        sortCol = null;
        sortDir = 'asc';
      }
      page = 0;
      updateSortHeaders();
      render();
    });
  });

  filterBar.addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if(!btn) return;
    activeFilter = btn.dataset.filter;
    page = 0;
    filterBar.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b === btn));
    render();
  });

  render();
}

// ════════════════════════════════════════════════════════════════════
//  Boot — reads config sheet first, then partner data sheet
// ════════════════════════════════════════════════════════════════════
async function boot(){
  const slug = getSlug();

  if(!slug){ showLanding(); return; }

  if(!CONFIG_SHEET_ID || CONFIG_SHEET_ID === 'YOUR_CONFIG_SHEET_ID_HERE'){
    showError('Not configured yet',
      'Open <code>index.html</code> and replace <code>YOUR_CONFIG_SHEET_ID_HERE</code> with your config sheet ID.');
    return;
  }

  // Step 1: load master config sheet — fetch published CSV URL directly
  let configRows;
  try {
    configRows = await fetchSheet(CONFIG_CSV_DIRECT);
  } catch(e){
    showError('Could not load partner list',
      'Check that the config Google Sheet is published as CSV and the Sheet ID is correct. Error: ' + e.message);
    return;
  }

  // Step 2: find the partner matching this URL slug
  const partner = configRows.find(r =>
    (r[C.slug]||'').trim().toLowerCase() === slug.toLowerCase()
  );

  if(!partner){
    showError('Partner not found',
      `No partner with URL <code>/${slug}</code> exists in the config sheet yet. Ask your Sterlinx contact to add you.`);
    return;
  }

  // Password check
  const requiredPass = (partner[C.password]||'').trim();
  if(requiredPass){
    const stored = sessionStorage.getItem('sp_'+slug);
    if(stored !== requiredPass){
      showSignout(false);
      document.getElementById('app').innerHTML = `
        <div class="state" style="min-height:100vh">
          <div style="background:var(--white);border:1px solid var(--border);border-radius:12px;padding:2rem 2.5rem;width:320px;text-align:center">
            <div style="font-family:'DM Serif Display',serif;font-size:22px;margin-bottom:8px">Partner Portal</div>
            <div style="font-size:13px;color:var(--muted);margin-bottom:1.5rem">Enter your access password</div>
            <input id="pass-input" type="password" placeholder="Password" style="width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;margin-bottom:12px;outline:none">
            <button id="pass-btn" style="width:100%;padding:10px;background:var(--navy);color:white;border:none;border-radius:8px;font-size:14px;cursor:pointer">Access Dashboard</button>
            <div id="pass-err" style="color:#9b2c2c;font-size:12px;margin-top:8px"></div>
          </div>
        </div>`;
      document.getElementById('sb-av').textContent = 'S';
      document.getElementById('sb-name').textContent = 'Partner Portal';
      const check = () => {
        const val = document.getElementById('pass-input').value;
        if(val === requiredPass){
          sessionStorage.setItem('sp_'+slug, val);
          boot();
        } else {
          document.getElementById('pass-err').textContent = 'Incorrect password';
        }
      };
      document.getElementById('pass-btn').addEventListener('click', check);
      document.getElementById('pass-input').addEventListener('keydown', e => { if(e.key==='Enter') check(); });
      return;
    }
  }

  // Update sidebar immediately with name while data loads
  document.getElementById('sb-av').textContent   = av(partner[C.name]);
  document.getElementById('sb-name').textContent = partner[C.name];

  // Step 3: extract Sheet ID from the partner's Google Sheet URL
  const partnerSheetId = extractId(partner[C.url]);
  const partnerTab     = (partner[C.tab]||'Commission_Log').trim();

  if(!partnerSheetId){
    showError('Invalid sheet URL',
      `The sheet URL for <strong>${partner[C.name]}</strong> doesn't look right. Check the config sheet.`);
    return;
  }

  // Step 4: load the partner's commission data
  let rows;
  try {
    rows = await fetchSheet(partner[C.url].trim(),0);
  } catch(e){
    showError('Could not load commission data',
      `The sheet for <strong>${partner[C.name]}</strong> couldn't be loaded. Make sure it's published as CSV.`);
    return;
  }

  // Step 5: render
  showSignout(true);
  subscribeToPush(slug);
  renderDashboard(partner, rows);
}

boot();

document.getElementById('logout-btn').addEventListener('click', () => {
  sessionStorage.clear();
  window.location.reload();
});
</script>
<script>
// ── PWA: Service Worker registration ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/service-worker.js').catch(() => {});
  });
}

// ── PWA: Push subscription (called after successful auth) ──
async function subscribeToPush(slug) {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
  try {
    const reg = await navigator.serviceWorker.ready;
    const existing = await reg.pushManager.getSubscription();
    if (existing) {
      // Re-register existing subscription so server keeps it fresh
      await fetch('/push-subscribe', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ slug, subscription: existing.toJSON() })
      }).catch(() => {});
      return;
    }
    const vapidResp = await fetch('/push-vapid-key');
    if (!vapidResp.ok) return; // server not yet configured — fail silently
    const { publicKey } = await vapidResp.json();
    const sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(publicKey)
    });
    await fetch('/push-subscribe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ slug, subscription: sub.toJSON() })
    }).catch(() => {});
  } catch (e) {
    // Permission denied or any other error — non-fatal
    console.warn('Push subscription skipped:', e.message);
  }
}

function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const raw = atob(base64);
  return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
}
